services:
  tor-proxy:
    image: dperson/torproxy
    container_name: dark-web-tor-proxy
    ports:
      - "9050:9050"
    restart: unless-stopped
    environment:
      - TOR_NewCircuitPeriod=120
      - TOR_MaxCircuitDirtiness=600
    healthcheck:
      test: ["CMD", "curl", "--socks5", "localhost:9050", "--max-time", "5", "https://check.torproject.org/api/ip"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
